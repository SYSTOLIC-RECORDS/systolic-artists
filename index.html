<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systolic Records — Artists</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --red: #e8000d; --crimson: #8b0000; --black: #000; --white: #f0ede8; }

html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 50vh 50vh;
  width: 100%;
  height: 100vh;
  gap: 2px;
}

.card {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: #060606;
}

.card-photo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  z-index: 1;
  filter: brightness(0.55) saturate(0.25);
  transition: filter 0.6s ease;
  display: block;
  pointer-events: none;
}
.card:hover .card-photo,
.card.tapped .card-photo {
  filter: brightness(0.72) saturate(0.6);
}

.card-grad {
  position: absolute;
  inset: 0;
  z-index: 2;
  background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.92) 100%);
  pointer-events: none;
}

.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid transparent;
  z-index: 10;
  pointer-events: none;
  transition: border-color 0.5s;
}
.card:hover::after,
.card.tapped::after { border-color: rgba(232,0,13,0.5); }

.card-inner {
  position: absolute;
  inset: 0;
  z-index: 6;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: clamp(0.8rem, 2vw, 1.6rem);
}

.card-num {
  font-size: 9px;
  letter-spacing: 0.4em;
  color: rgba(232,0,13,0.25);
  margin-bottom: auto;
  transition: color 0.3s;
}
.card:hover .card-num,
.card.tapped .card-num { color: rgba(232,0,13,0.7); }

.card-role {
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 0.3rem;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.35s, transform 0.35s;
}
.card:hover .card-role,
.card.tapped .card-role { opacity: 1; transform: translateY(0); }

.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(26px, 4.5vw, 58px);
  line-height: 0.88;
  color: var(--white);
  letter-spacing: 0.03em;
  transition: color 0.4s;
}
.card:hover .card-name,
.card.tapped .card-name { color: var(--red); }

.card-genre {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(240,237,232,0.22);
  margin-top: 0.35rem;
  transition: color 0.3s;
}
.card:hover .card-genre,
.card.tapped .card-genre { color: rgba(232,0,13,0.45); }

.card-cta {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 8px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--red);
  margin-top: 0.6rem;
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.3s 0.1s, transform 0.3s 0.1s;
}
.card-cta::after {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--red);
  transition: width 0.3s;
}
.card:hover .card-cta,
.card.tapped .card-cta { opacity: 1; transform: translateX(0); }
.card:hover .card-cta::after,
.card.tapped .card-cta::after { width: 30px; }

/* BIO OVERLAY */
.bio-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.96);
  display: grid;
  place-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.bio-overlay.open { opacity: 1; pointer-events: all; }

.bio-panel {
  width: min(680px, 90vw);
  max-height: 88vh;
  overflow-y: auto;
  padding: 2.5rem clamp(1.2rem,5vw,3rem);
  border-left: 2px solid var(--red);
  scrollbar-width: thin;
  scrollbar-color: var(--crimson) transparent;
}
.bio-panel::-webkit-scrollbar { width: 3px; }
.bio-panel::-webkit-scrollbar-thumb { background: var(--crimson); }

.bio-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(42px, 8vw, 80px);
  line-height: 0.9;
  color: var(--white);
  margin-bottom: 0.4rem;
}
.bio-role {
  font-size: 10px;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 2rem;
}
.bio-body p {
  font-size: clamp(13px, 1.7vw, 15px);
  font-weight: 300;
  line-height: 1.75;
  color: rgba(240,237,232,0.65);
  margin-bottom: 1rem;
}
.bio-quote {
  font-size: clamp(14px, 1.8vw, 17px);
  font-style: italic;
  color: var(--red);
  font-weight: 300;
  margin-top: 1.6rem;
  padding-top: 1.4rem;
  border-top: 1px solid rgba(232,0,13,0.15);
}
.bio-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 1.4rem;
}
.bio-tag {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  border: 1px solid rgba(232,0,13,0.2);
  color: rgba(232,0,13,0.5);
  padding: 0.3rem 0.6rem;
}
.bio-close {
  position: fixed;
  top: 1.4rem;
  right: 1.4rem;
  background: none;
  border: 1px solid rgba(240,237,232,0.1);
  color: rgba(240,237,232,0.35);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  letter-spacing: 0.35em;
  padding: 0.5rem 1rem;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.25s, color 0.25s;
  z-index: 201;
}
.bio-close:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="grid">

  <div class="card" data-artist="gatnau">
    <img class="card-photo" src="gatnau.jpg" alt="Gatnau" draggable="false">
    <div class="card-grad"></div>
    <div class="card-inner">
      <div class="card-num">01</div>
      <div class="card-role">Founder &amp; CEO</div>
      <div class="card-name">GATNAU</div>
      <div class="card-genre">Schranz  160 BPM  Madrid</div>
      <div class="card-cta">Profile</div>
    </div>
  </div>

  <div class="card" data-artist="drey">
    <img class="card-photo" src="drey.png" alt="Drey" draggable="false">
    <div class="card-grad"></div>
    <div class="card-inner">
      <div class="card-num">02</div>
      <div class="card-role">A&amp;R / Label Manager</div>
      <div class="card-name">DREY</div>
      <div class="card-genre">Hard Techno  Schranz  Madrid</div>
      <div class="card-cta">Profile</div>
    </div>
  </div>

  <div class="card" data-artist="teri">
    <img class="card-photo" src="teri-makasih.png" alt="Teri Makasih" draggable="false">
    <div class="card-grad"></div>
    <div class="card-inner">
      <div class="card-num">03</div>
      <div class="card-role">Artist</div>
      <div class="card-name">TERI MAKASIH</div>
      <div class="card-genre">Hardcore  Industrial  Madrid</div>
      <div class="card-cta">Profile</div>
    </div>
  </div>

  <div class="card" data-artist="whitespirit">
    <img class="card-photo" src="white-spirit.png" alt="White Spirit" draggable="false">
    <div class="card-grad"></div>
    <div class="card-inner">
      <div class="card-num">04</div>
      <div class="card-role">Artist</div>
      <div class="card-name">WHITE SPIRIT</div>
      <div class="card-genre">Schranz  Netherlands</div>
      <div class="card-cta">Profile</div>
    </div>
  </div>

</div>

<div id="bio-overlay" class="bio-overlay">
  <button class="bio-close" id="bio-close">&#x2715; &nbsp;Close</button>
  <div class="bio-panel">
    <div class="bio-name" id="bio-name"></div>
    <div class="bio-role" id="bio-role"></div>
    <div class="bio-body" id="bio-body"></div>
    <div class="bio-quote" id="bio-quote"></div>
    <div class="bio-tags" id="bio-tags"></div>
  </div>
</div>

<script>
const ARTISTS = {
  gatnau: {
    name: 'GATNAU', role: 'Founder & CEO — Systolic Records',
    bio: ['Based in Madrid, he is the creator and driving force behind Systolic Records — a project born from the need to push beyond the boundaries of conventional hard techno.',
          'His natural territory: Schranz at 160 BPM. Kick drums, rhythmic pressure, hypnosis. His musical narrative is built on gradual aggression — from subtle intensity to total release.',
          'His track "Testing" reached the Beatport Top 100. Throughout 2026, a massive wave of exclusive content — sets loaded with unreleased tracks and a direct connection with the dancefloor.'],
    quote: '"Gatnau doesn\'t follow trends. He creates them."',
    tags: ['Schranz', '160 BPM', 'Madrid', 'Beatport Top 100']
  },
  drey: {
    name: 'DREY', role: 'A&R / Label Manager — Systolic Records',
    bio: ['Madrid-based DJ and producer. In just a few years he established himself on the European circuit with support from Luciid, Shlømo, Vendex, and Svetec.',
          'Releases on Mad Made, Darkground, DSR Digital, Kube Records — repeatedly reaching the Beatport Top 10. Label Manager at Systolic Records since 2024.',
          'On stage at Fabrik, Sala Sonora, Marmarela, Dvrk Sun, Verknipt Portugal, Komplex. Hard Techno, groove, and old-school Schranz — raw and unapologetically powerful.'],
    quote: '"Raw, emotional, unapologetically powerful."',
    tags: ['Hard Techno', 'Schranz', 'Madrid', 'Beatport Top 10', 'Fabrik']
  },
  teri: {
    name: 'TERI MAKASIH', role: 'Artist — Hardcore / Schranz / Hard Techno',
    bio: ['DJ and producer based in Madrid. She began her journey in 2018 in Bali, Indonesia — the birthplace of her artistic name. Quickly earned a place among Madrid\'s most recognized emerging talents.',
          'International expansion since 2022 across Spain, Portugal, Italy, Belgium, and UAE. Stages shared with Fernanda Martins, Under Black Helmet, Perc, and others.',
          'Current project: Hard Industrial, Rawstyle, Hardstyle, Hardcore, Metalcore, and Rap fused into a boundary-defying sound. Art that transcends trends.'],
    quote: '"The only true limits are those we impose on ourselves."',
    tags: ['Hardcore', 'Industrial', 'Hardstyle', 'Madrid', 'Bali', 'Concrete Berlin']
  },
  whitespirit: {
    name: 'WHITE SPIRIT', role: 'Artist — Schranz',
    bio: ['DJ and producer based in the Netherlands. Old-school Schranz elements fused with modern production — always leaving room for melody and catchy detail.',
          'Rather than following a fixed formula, White Spirit gives Schranz his own twist — balancing raw energy with musical expression.',
          'Being part of Systolic Records is meaningful to him. A place where he felt understood and found people who believe in his sound.'],
    quote: '"Where creativity, intensity and melody converge."',
    tags: ['Schranz', 'Netherlands', 'Old-school', 'Melodic']
  }
};

document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', () => openBio(card.dataset.artist));
  card.addEventListener('touchstart', () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('tapped'));
    card.classList.add('tapped');
  }, { passive: true });
});

const overlay = document.getElementById('bio-overlay');
document.getElementById('bio-close').addEventListener('click', closeBio);
overlay.addEventListener('click', e => { if (e.target === overlay) closeBio(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBio(); });

function openBio(id) {
  const a = ARTISTS[id]; if (!a) return;
  document.getElementById('bio-name').textContent = a.name;
  document.getElementById('bio-role').textContent = a.role;
  document.getElementById('bio-body').innerHTML = a.bio.map(p => '<p>' + p + '</p>').join('');
  document.getElementById('bio-quote').textContent = a.quote;
  document.getElementById('bio-tags').innerHTML = a.tags.map(t => '<span class="bio-tag">' + t + '</span>').join('');
  overlay.classList.add('open');
}
function closeBio() {
  overlay.classList.remove('open');
}
</script>
</body>
</html>
